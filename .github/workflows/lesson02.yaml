name: Terraform deploy lesson02

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to deploy
        required: true
        default: main
        type: choice
        options:
          - main
          - lesson02
      environment:
        description: Target environment to deploy
        required: true
        default: dev
        type: choice
        options:
          - dev
          - sandbox

concurrency:
  group: lesson02-${{ inputs.branch }}
  cancel-in-progress: true

env:
  TF_CLOUD_TOKEN: ${{ secrets.TF_CLOUD_TOKEN }}

jobs:
  terraform:
    name: Deploy lesson02
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.15.7

      - uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Set Terraform variables
        run: |
          echo "TF_VAR_environment=${{ inputs.environment }}" >> $GITHUB_ENV
          echo "TF_VAR_region=ap-southeast-2" >> $GITHUB_ENV

      - name: Terraform init
        working-directory: lesson02
        run: terraform init -input=false

      - name: Terraform plan
        working-directory: lesson02
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        working-directory: lesson02
        run: terraform apply -input=false -auto-approve tfplan
